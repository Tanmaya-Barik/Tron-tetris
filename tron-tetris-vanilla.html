<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TRON Tetris (Vanilla)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;700&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&display=swap');

    :root {
      --bg-deep-black: #050a15;
      --bg-dark-navy: #0a1128;
      --neon-cyan: #00f0ff;
      --electric-blue: #0077ff;
      --bright-white: #ffffff;
      --accent-magenta: #ff00ff;
      --accent-orange: #ff5500;
      
      --font-title: 'Audiowide', cursive;
      --font-score: 'Orbitron', sans-serif;
      --font-text: 'Rajdhani', sans-serif;
      
      --glow-cyan-soft: 0 0 10px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.1);
      --glow-cyan-medium: 0 0 15px rgba(0, 240, 255, 0.6), inset 0 0 15px rgba(0, 240, 255, 0.3);
      --glow-cyan-strong: 0 0 25px rgba(0, 240, 255, 0.9), inset 0 0 20px rgba(0, 240, 255, 0.5);
      
      --glass-bg: rgba(10, 17, 40, 0.6);
      
      --cell-size: clamp(14px, min(4.5vw, 2.7vh), 30px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    html, body {
      width: 100vw; height: 100vh;
      background-color: var(--bg-deep-black); color: var(--bright-white);
      font-family: var(--font-text); overflow: hidden;
    }

    @keyframes perspectiveGridMove {
      0% { background-position: center bottom; }
      100% { background-position: center calc(bottom + 40px); }
    }

    .background-scene {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
      background: radial-gradient(circle at center 30%, rgba(10, 17, 40, 0.9) 0%, var(--bg-deep-black) 100%);
      display: flex; flex-direction: column; justify-content: flex-end; align-items: center; overflow: hidden;
    }
    .perspective-grid {
      position: absolute; bottom: 0; width: 100vw; height: 40vh;
      background-image: linear-gradient(rgba(0, 240, 255, 0.3) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 240, 255, 0.3) 1px, transparent 1px);
      background-size: 40px 40px; background-position: center bottom;
      transform: perspective(600px) rotateX(75deg); transform-origin: bottom center;
      animation: perspectiveGridMove 2s linear infinite;
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
    }
    .ambient-glow {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60vw; height: 60vh; background: radial-gradient(circle, rgba(0, 240, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .app-container {
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      width: 100%; height: 100vh; position: relative; z-index: 10; padding: 1rem 0.5rem; overflow: hidden;
    }

    .top-stats-row { display: flex; justify-content: center; gap: 3rem; width: 100%; max-width: 800px; }
    .middle-game-area { display: flex; flex-direction: row; align-items: flex-start; justify-content: center; gap: 1.5rem; }
    .bottom-controls-row { display: flex; justify-content: center; width: 100%; max-width: 500px; }

    .glass-panel {
      background: rgba(10, 17, 40, 0.4); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 8px;
      padding: 1rem; box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(0, 240, 255, 0.05);
      display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden;
    }
    .glass-panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.05), transparent); pointer-events: none;
    }
    .panel-title {
      font-family: var(--font-title); font-size: 1rem; text-transform: uppercase;
      color: var(--bright-white); text-shadow: 0 0 5px var(--neon-cyan);
      text-align: center; margin-bottom: 1rem; letter-spacing: 1px;
    }

    /* Score */
    .score-panel { display: flex; flex-direction: row; justify-content: space-around; align-items: center; width: 100%; gap: 1rem; }
    .score-item { display: flex; flex-direction: column; align-items: center; position: relative; }
    .score-label { font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); text-transform: uppercase; margin-bottom: 0.3rem; letter-spacing: 1px; }
    .score-value { font-family: var(--font-score); font-size: 1.5rem; color: var(--neon-cyan); text-shadow: var(--glow-cyan-soft); }

    /* Board */
    .board-container { position: relative; display: flex; justify-content: center; align-items: center; }
    .board {
      display: grid; grid-template-rows: repeat(20, var(--cell-size)); grid-template-columns: repeat(10, var(--cell-size));
      background: rgba(10, 17, 40, 0.6); border: 3px solid var(--neon-cyan);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 30px rgba(0, 240, 255, 0.2);
      border-radius: 8px; overflow: hidden; position: relative; z-index: 2; backdrop-filter: blur(5px);
    }
    .board::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 50%, transparent 51%, transparent 100%);
      pointer-events: none; z-index: 20;
    }

    /* Cell */
    .cell { width: var(--cell-size); height: var(--cell-size); display: flex; justify-content: center; align-items: center; position: relative; box-sizing: border-box; }
    .cell:not(.filled):not(.ghost) { border: 1px solid rgba(0, 240, 255, 0.08); }
    .cell.filled {
      background-color: currentColor; border: 1px solid rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 6px currentColor, inset 0 0 10px rgba(0, 0, 0, 0.7);
      border-radius: 2px; position: relative; z-index: 10;
    }
    .cell.ghost { border: 2px solid currentColor; opacity: 0.15; box-shadow: 0 0 5px currentColor, inset 0 0 5px currentColor; border-radius: 4px; }

    /* Previews */
    .preview-panel { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-width: calc(var(--cell-size) * 5); }
    .preview-panel.square { height: calc(var(--cell-size) * 5); justify-content: center; }
    .preview-grid-wrapper { display: flex; justify-content: center; align-items: center; margin: 0.5rem 0; }
    .preview-grid { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .preview-grid .cell { width: calc(var(--cell-size) * 0.8); height: calc(var(--cell-size) * 0.8); border-width: 1.5px; }
    .preview-grid > div { display: flex; }
    .empty-preview { width: calc(var(--cell-size) * 3.2); height: calc(var(--cell-size) * 3.2); }

    /* Controls */
    .bottom-controls-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .minimal-controls { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.5rem; }
    .minimal-btn {
      width: min(50px, 7vh); height: min(50px, 7vh); border-radius: 50%; background: rgba(10, 17, 40, 0.4);
      border: 1px solid var(--neon-cyan); color: var(--neon-cyan); display: flex; justify-content: center; align-items: center;
      font-size: 1.2rem; box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2), 0 0 10px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px); transition: all 0.2s ease; cursor: pointer;
    }
    .minimal-btn:hover { background: rgba(0, 240, 255, 0.1); transform: scale(1.1); color: var(--bright-white); text-shadow: 0 0 5px var(--bright-white); }
    .touch-controls { width: 100%; padding: 0; z-index: 100; }
    .touch-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 0.5rem; gap: 0.5rem; }
    .touch-btn {
      background: var(--glass-bg); border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
      border-radius: 50%; width: min(60px, 15vw); height: min(60px, 8vh); display: flex; justify-content: center; align-items: center;
      font-size: 1.5rem; box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2); transition: all 0.1s; cursor: pointer;
    }
    .touch-btn:active { transform: scale(0.9); background: rgba(0, 240, 255, 0.3); }
    .touch-btn.large { flex: 1; border-radius: 12px; height: min(60px, 8vh); font-family: var(--font-title); font-size: 1rem; text-transform: uppercase; }

    /* Overlays */
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    .overlay.active { display: flex; }
    .overlay h1 { font-family: var(--font-title); font-size: 3rem; color: var(--neon-cyan); text-shadow: var(--glow-cyan-strong); margin-bottom: 2rem; }
    .btn { background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); font-family: var(--font-score); font-size: 1.5rem; padding: 1rem 3rem; cursor: pointer; transition: all 0.2s; box-shadow: var(--glow-cyan-soft); text-transform: uppercase; border-radius: 4px; }
    .btn:hover { background: var(--neon-cyan); color: var(--bg-deep-black); box-shadow: var(--glow-cyan-strong); }

    @media (max-width: 900px) { .top-stats-row { gap: 1.5rem; } .middle-game-area { gap: 1rem; } }
    @media (max-width: 600px) { .top-stats-row { gap: 1rem; font-size: 0.8rem; margin-bottom: 0; } .middle-game-area { gap: 0.5rem; } .glass-panel { padding: 0.5rem; } }
  </style>
</head>
<body>

  <div class="background-scene">
    <div class="perspective-grid"></div>
    <div class="ambient-glow"></div>
    
    <div class="app-container">
      
      <!-- TOP ROW: STATS -->
      <div class="top-stats-row score-panel">
        <div class="score-item">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="ui-score">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">HIGH SCORE</span>
          <span class="score-value" id="ui-highscore" style="color: var(--bright-white); text-shadow: var(--glow-white);">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">LINES</span>
          <span class="score-value" id="ui-lines">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">LEVEL</span>
          <span class="score-value" id="ui-level">1</span>
        </div>
      </div>

      <!-- MIDDLE ROW: GAME AREA -->
      <div class="middle-game-area">
        
        <!-- Left: Hold -->
        <div class="glass-panel preview-panel square">
          <div class="panel-title">HOLD</div>
          <div class="preview-grid-wrapper">
            <div class="preview-grid" id="hold-grid"><div class="empty-preview"></div></div>
          </div>
        </div>

        <!-- Center: Board -->
        <div class="board-container">
          <div class="board" id="main-board"></div>
          <!-- Game Over / Pause Overlays -->
          <div class="overlay" id="overlay">
            <h1 id="overlay-title">GAME OVER</h1>
            <button class="btn" id="overlay-btn">RESTART</button>
          </div>
        </div>

        <!-- Right: Next -->
        <div class="glass-panel preview-panel" style="min-height: 250px;">
          <div class="panel-title">NEXT</div>
          <div style="display: flex; flexDirection: column; gap: 1rem;" id="next-queue"></div>
        </div>

      </div>

      <!-- BOTTOM ROW: CONTROLS -->
      <div class="bottom-controls-row bottom-controls-container">
        <div class="minimal-controls">
          <button class="minimal-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
          <button class="minimal-btn play-btn" id="btn-pause" title="Pause/Play">▶</button>
        </div>

        <div class="touch-controls" id="touch-controls">
          <div class="touch-row">
            <button class="touch-btn" id="btn-hold">H</button>
            <button class="touch-btn" id="btn-harddrop">⤓</button>
            <button class="touch-btn" id="btn-rotate">↻</button>
          </div>
          <div class="touch-row" style="margin-top: 1rem;">
            <button class="touch-btn large" id="btn-left">←</button>
            <button class="touch-btn large" id="btn-softdrop">↓</button>
            <button class="touch-btn large" id="btn-right">→</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- Constants ---
    const BOARD_WIDTH = 10;
    const BOARD_HEIGHT = 20;
    const INITIAL_DROP_TIME = 1000;
    const MIN_DROP_TIME = 100;
    const DROP_TIME_DECREMENT = 50;
    const POINTS = { SINGLE: 100, DOUBLE: 300, TRIPLE: 500, TETRIS: 800, SOFT_DROP: 1, HARD_DROP: 2 };
    
    const TETROMINOES = {
      0: { shape: [[0]], color: '0, 0, 0' },
      I: { shape: [[0, 'I', 0, 0], [0, 'I', 0, 0], [0, 'I', 0, 0], [0, 'I', 0, 0]], color: '0, 240, 255' },
      J: { shape: [[0, 'J', 0], [0, 'J', 0], ['J', 'J', 0]], color: '0, 119, 255' },
      L: { shape: [[0, 'L', 0], [0, 'L', 0], [0, 'L', 'L']], color: '255, 85, 0' },
      O: { shape: [['O', 'O'], ['O', 'O']], color: '255, 238, 0' },
      S: { shape: [[0, 'S', 'S'], ['S', 'S', 0], [0, 0, 0]], color: '0, 255, 102' },
      T: { shape: [[0, 0, 0], ['T', 'T', 'T'], [0, 'T', 0]], color: '255, 0, 255' },
      Z: { shape: [['Z', 'Z', 0], [0, 'Z', 'Z'], [0, 0, 0]], color: '255, 0, 60' },
    };

    // --- Audio Synthesis ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    const playSound = (freq, type, duration, vol) => {
      if (!actx) return;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, actx.currentTime);
      gain.gain.setValueAtTime(vol, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
      osc.connect(gain); gain.connect(actx.destination);
      osc.start(); osc.stop(actx.currentTime + duration);
    };
    const audio = {
      init: () => { if (!actx) actx = new AudioContext(); },
      move: () => playSound(440, 'square', 0.1, 0.05),
      rotate: () => playSound(660, 'sine', 0.1, 0.05),
      drop: () => playSound(220, 'square', 0.1, 0.05),
      hardDrop: () => playSound(110, 'sawtooth', 0.15, 0.1),
      clear: () => { playSound(880, 'square', 0.1, 0.1); setTimeout(() => playSound(1760, 'sine', 0.2, 0.1), 100); },
      tetris: () => { [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.15, 0.1), i * 100)); },
      gameover: () => playSound(110, 'sawtooth', 1, 0.2)
    };

    // --- State ---
    let board = Array.from({ length: BOARD_HEIGHT }, () => Array(BOARD_WIDTH).fill(0));
    let piece = null;
    let nextPieces = [];
    let holdPiece = null;
    let canHold = true;
    let gameState = 'START'; // START, PLAYING, PAUSED, GAME_OVER
    let score = 0, lines = 0, level = 1, dropTime = INITIAL_DROP_TIME, dropCounter = 0;
    let lastTime = 0;
    let reqId = null;
    let bag = [];
    let highScore = localStorage.getItem('tron-tetris-highscore') || 0;

    // --- Logic Helpers ---
    const randomPiece = () => {
      if (bag.length === 0) {
        bag = ['I', 'J', 'L', 'O', 'S', 'T', 'Z'];
        for (let i = bag.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bag[i], bag[j]] = [bag[j], bag[i]];
        }
      }
      return bag.pop();
    };

    const checkCollision = (p, b, { x: moveX, y: moveY }) => {
      for (let y = 0; y < p.shape.length; y += 1) {
        for (let x = 0; x < p.shape[y].length; x += 1) {
          if (p.shape[y][x] !== 0) {
            if (
              !b[y + p.pos.y + moveY] ||
              !b[y + p.pos.y + moveY][x + p.pos.x + moveX] ||
              b[y + p.pos.y + moveY][x + p.pos.x + moveX] !== 0
            ) return true;
          }
        }
      }
      return false;
    };

    const rotate = (matrix, dir) => {
      const rotated = matrix.map((_, index) => matrix.map(col => col[index]));
      if (dir > 0) return rotated.map(row => row.reverse());
      return rotated.reverse();
    };

    const calcGhostY = () => {
      let shift = 0;
      while (!checkCollision(piece, board, { x: 0, y: shift + 1 })) shift++;
      return piece.pos.y + shift;
    };

    // --- UI Renderers ---
    const boardEl = document.getElementById('main-board');
    const initDomBoard = () => {
      boardEl.innerHTML = '';
      for (let y = 0; y < BOARD_HEIGHT; y++) {
        for (let x = 0; x < BOARD_WIDTH; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `c-${y}-${x}`;
          boardEl.appendChild(cell);
        }
      }
    };

    const renderBoard = () => {
      // Clear cells
      for (let y = 0; y < BOARD_HEIGHT; y++) {
        for (let x = 0; x < BOARD_WIDTH; x++) {
          const el = document.getElementById(`c-${y}-${x}`);
          const val = board[y][x];
          el.className = 'cell';
          el.style = '';
          if (val !== 0) {
            el.classList.add('filled');
            el.style.color = `rgb(${TETROMINOES[val].color})`;
          }
        }
      }
      
      if (!piece || gameState !== 'PLAYING') return;

      // Draw Ghost
      const ghostY = calcGhostY();
      piece.shape.forEach((row, y) => {
        row.forEach((val, x) => {
          if (val !== 0) {
            const gy = y + ghostY;
            if (gy >= 0 && gy < BOARD_HEIGHT) {
              const el = document.getElementById(`c-${gy}-${x + piece.pos.x}`);
              if (el && !el.classList.contains('filled')) {
                el.classList.add('ghost');
                el.style.color = `rgb(${TETROMINOES[piece.type].color})`;
              }
            }
          }
        });
      });

      // Draw Active Piece
      piece.shape.forEach((row, y) => {
        row.forEach((val, x) => {
          if (val !== 0) {
            const ay = y + piece.pos.y;
            if (ay >= 0 && ay < BOARD_HEIGHT) {
              const el = document.getElementById(`c-${ay}-${x + piece.pos.x}`);
              if(el) {
                el.className = 'cell filled';
                el.style.color = `rgb(${TETROMINOES[piece.type].color})`;
              }
            }
          }
        });
      });
    };

    const renderPreview = (type, containerId) => {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      if (!type) {
        container.innerHTML = '<div class="empty-preview"></div>';
        return;
      }
      const shape = TETROMINOES[type].shape;
      shape.forEach(row => {
        const rowEl = document.createElement('div');
        row.forEach(val => {
          const cell = document.createElement('div');
          cell.className = val ? 'cell filled' : 'cell';
          if(val) cell.style.color = `rgb(${TETROMINOES[type].color})`;
          rowEl.appendChild(cell);
        });
        container.appendChild(rowEl);
      });
    };

    const updateUI = () => {
      document.getElementById('ui-score').innerText = score;
      document.getElementById('ui-highscore').innerText = highScore;
      document.getElementById('ui-lines').innerText = lines;
      document.getElementById('ui-level').innerText = level;

      renderPreview(holdPiece, 'hold-grid');
      const nextContainer = document.getElementById('next-queue');
      nextContainer.innerHTML = '';
      nextPieces.forEach((p, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'preview-grid';
        wrap.id = `next-${i}`;
        nextContainer.appendChild(wrap);
        renderPreview(p, `next-${i}`);
      });
    };

    // --- Game Engine ---
    const spawnPiece = (type = null) => {
      if (!type) {
        type = nextPieces.shift();
        nextPieces.push(randomPiece());
      }
      piece = {
        pos: { x: Math.floor(BOARD_WIDTH / 2) - 1, y: 0 },
        shape: TETROMINOES[type].shape,
        type: type
      };
      if (checkCollision(piece, board, { x: 0, y: 0 })) {
        gameState = 'GAME_OVER';
        audio.gameover();
        if (score > highScore) { highScore = score; localStorage.setItem('tron-tetris-highscore', highScore); }
        showOverlay('GAME OVER', 'RESTART');
      }
      updateUI();
    };

    const lockPiece = () => {
      piece.shape.forEach((row, y) => {
        row.forEach((val, x) => {
          if (val !== 0) {
            const by = y + piece.pos.y;
            if (by >= 0 && by < BOARD_HEIGHT) board[by][x + piece.pos.x] = piece.type;
          }
        });
      });

      let linesCleared = 0;
      board = board.reduce((acc, row) => {
        if (row.every(val => val !== 0)) {
          linesCleared++;
          acc.unshift(Array(BOARD_WIDTH).fill(0));
        } else {
          acc.push(row);
        }
        return acc;
      }, []);

      if (linesCleared > 0) {
        if (linesCleared >= 4) audio.tetris(); else audio.clear();
        const base = linesCleared === 1 ? POINTS.SINGLE : linesCleared === 2 ? POINTS.DOUBLE : linesCleared === 3 ? POINTS.TRIPLE : POINTS.TETRIS;
        score += base * level;
        lines += linesCleared;
        const newLevel = Math.floor(lines / 10) + 1;
        if (newLevel > level) {
          level = newLevel;
          dropTime = Math.max(MIN_DROP_TIME, INITIAL_DROP_TIME - (level - 1) * DROP_TIME_DECREMENT);
        }
      } else {
        audio.drop();
      }

      canHold = true;
      spawnPiece();
    };

    const drop = () => {
      if (!checkCollision(piece, board, { x: 0, y: 1 })) {
        piece.pos.y += 1;
      } else {
        if (piece.pos.y < 1) {
          gameState = 'GAME_OVER';
          audio.gameover();
          if (score > highScore) { highScore = score; localStorage.setItem('tron-tetris-highscore', highScore); }
          showOverlay('GAME OVER', 'RESTART');
          return;
        }
        lockPiece();
      }
      dropCounter = 0;
    };

    const update = (time = 0) => {
      if (gameState === 'PLAYING') {
        const dt = time - lastTime;
        lastTime = time;
        dropCounter += dt;
        if (dropCounter > dropTime) drop();
        renderBoard();
      }
      reqId = requestAnimationFrame(update);
    };

    // --- Actions ---
    const move = (dir) => {
      if (gameState !== 'PLAYING') return;
      if (!checkCollision(piece, board, { x: dir, y: 0 })) {
        piece.pos.x += dir;
        audio.move();
        renderBoard();
      }
    };
    const playerRotate = () => {
      if (gameState !== 'PLAYING') return;
      const originalShape = piece.shape;
      piece.shape = rotate(piece.shape, 1);
      if (checkCollision(piece, board, { x: 0, y: 0 })) {
        piece.shape = originalShape; // revert
      } else {
        audio.rotate();
        renderBoard();
      }
    };
    const hardDrop = () => {
      if (gameState !== 'PLAYING') return;
      let dist = calcGhostY() - piece.pos.y;
      piece.pos.y += dist;
      score += dist * POINTS.HARD_DROP;
      audio.hardDrop();
      lockPiece();
      renderBoard();
    };
    const playerHold = () => {
      if (gameState !== 'PLAYING' || !canHold) return;
      const current = piece.type;
      const holds = holdPiece;
      holdPiece = current;
      canHold = false;
      if (holds) spawnPiece(holds); else spawnPiece();
    };
    
    // --- Lifecycle ---
    const startGame = () => {
      audio.init();
      board = Array.from({ length: BOARD_HEIGHT }, () => Array(BOARD_WIDTH).fill(0));
      score = 0; lines = 0; level = 1; dropTime = INITIAL_DROP_TIME;
      nextPieces = [randomPiece(), randomPiece(), randomPiece()];
      holdPiece = null; canHold = true;
      document.getElementById('overlay').classList.remove('active');
      gameState = 'PLAYING';
      spawnPiece();
      document.getElementById('btn-pause').innerText = '⏸';
      if(reqId) cancelAnimationFrame(reqId);
      lastTime = performance.now();
      update();
    };

    const togglePause = () => {
      audio.init();
      if (gameState === 'START') startGame();
      else if (gameState === 'PLAYING') { gameState = 'PAUSED'; showOverlay('PAUSED', 'RESUME'); document.getElementById('btn-pause').innerText = '▶'; }
      else if (gameState === 'PAUSED') { gameState = 'PLAYING'; document.getElementById('overlay').classList.remove('active'); document.getElementById('btn-pause').innerText = '⏸'; lastTime = performance.now(); }
    };

    const showOverlay = (title, btn) => {
      document.getElementById('overlay-title').innerText = title;
      document.getElementById('overlay-btn').innerText = btn;
      document.getElementById('overlay').classList.add('active');
    };

    // --- Inputs ---
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') move(-1);
      else if (e.key === 'ArrowRight') move(1);
      else if (e.key === 'ArrowDown') drop();
      else if (e.key === 'ArrowUp') playerRotate();
      else if (e.key === ' ') hardDrop();
      else if (e.key === 'Shift') playerHold();
      else if (e.key === 'Escape') togglePause();
    });

    const addTouch = (id, fn) => {
      const el = document.getElementById(id);
      el.addEventListener('pointerdown', (e) => { e.preventDefault(); audio.init(); fn(); });
      el.addEventListener('contextmenu', e => e.preventDefault());
    };
    let softDropInt = null;
    document.getElementById('btn-softdrop').addEventListener('pointerdown', e => { e.preventDefault(); if(gameState==='PLAYING'){ drop(); softDropInt = setInterval(drop, 50); } });
    const stopSD = e => { e.preventDefault(); clearInterval(softDropInt); };
    document.getElementById('btn-softdrop').addEventListener('pointerup', stopSD);
    document.getElementById('btn-softdrop').addEventListener('pointerleave', stopSD);
    document.getElementById('btn-softdrop').addEventListener('contextmenu', e => e.preventDefault());

    addTouch('btn-left', () => move(-1));
    addTouch('btn-right', () => move(1));
    addTouch('btn-rotate', playerRotate);
    addTouch('btn-harddrop', hardDrop);
    addTouch('btn-hold', playerHold);
    
    document.getElementById('btn-pause').addEventListener('click', togglePause);
    document.getElementById('overlay-btn').addEventListener('click', () => {
      if (gameState === 'PAUSED') togglePause(); else startGame();
    });

    window.toggleFullscreen = () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
      else document.exitFullscreen().catch(()=>{});
    };

    // --- Init ---
    initDomBoard();
    updateUI();
    showOverlay('TRON TETRIS', 'START GAME');

  </script>
</body>
</html>
